# Use the artifacts at your own risk.

name: Windows Build

on:
  workflow_dispatch:
  push:
    paths:
      - '**/*.c'
      - '**/*.h'
      - '**/meson.build'
      - 'meson_options.txt'
      - '.github/workflows/windows-build.yaml'
  pull_request:
    paths:
      - '**/*.c'
      - '**/*.h'
      - '**/meson.build'
      - 'meson_options.txt'
      - '.github/workflows/windows-build.yaml'

jobs:
  build-windows:
    name: Build and Package on Windows (MSYS2 UCRT64)
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            base-devel
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-glib2

      - name: Install GIMP development package
        run: |
          # Package name can differ across MSYS2 snapshots.
          pacman -S --noconfirm --needed mingw-w64-ucrt-x86_64-gimp || \
          pacman -S --noconfirm --needed mingw-w64-ucrt-x86_64-gimp3

      - name: Show tool versions
        run: |
          gcc --version
          meson --version
          ninja --version
          pkg-config --modversion glib-2.0
          pkg-config --modversion gimp-3.0

      - name: Derive project version from meson.build
        run: |
          app_version="$(sed -n "s/.*version:[[:space:]]*'\([^']\+\)'.*/\1/p" meson.build | head -n 1)"
          if [[ -z "$app_version" ]]; then
            echo "Failed to parse project version from meson.build"
            exit 1
          fi
          echo "APP_VERSION=$app_version" >> "$GITHUB_ENV"
          echo "Using project version: $app_version"

      - name: Configure
        run: meson setup builddir -Dinstall-test=false -Dinstall-translations=true

      - name: Compile
        run: meson compile -C builddir -v

      - name: Stage install tree
        run: meson install -C builddir --destdir "$PWD/stage"

      - name: Prepare installer payload
        run: |
          plugin_root="$(find stage -type d -path '*/gimp/3.0/plug-ins' | head -n 1)"
          if [[ -z "$plugin_root" ]]; then
            echo "Could not find staged GIMP plug-ins directory under stage/."
            exit 1
          fi
          mkdir -p installer_payload/plug-ins
          cp -R "$plugin_root"/. installer_payload/plug-ins/

      - name: Create Inno Setup script
        run: |
          cat > resynthesizer-installer.iss << EOF
          [Setup]
          AppId={{A6A57352-7A90-4D84-9CE2-71C2782693B1}
          AppName=Resynthesizer Suite for GIMP 3
          AppVersion=${APP_VERSION}
          AppPublisher=Resynthesizer Project
          DefaultDirName={userappdata}\GIMP\3.0\plug-ins
          DisableProgramGroupPage=yes
          Compression=lzma
          SolidCompression=yes
          OutputDir=dist
          OutputBaseFilename=resynthesizer-suite-gimp3-windows-${APP_VERSION}
          WizardStyle=modern
          PrivilegesRequired=lowest

          [Files]
          Source: "installer_payload\\plug-ins\\*"; DestDir: "{app}"; Flags: recursesubdirs createallsubdirs ignoreversion
          EOF

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /Qp "resynthesizer-installer.iss"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: resynthesizer-installer-windows-ucrt64
          path: |
            dist/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: resynthesizer-windows-ucrt64
          path: |
            stage/
            builddir/meson-logs/meson-log.txt
          if-no-files-found: error
          retention-days: 14
